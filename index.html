<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Productos</title>
    <link rel="stylesheet" href="indexstyle.css">
</head>
<body>
    
    <div class="body-index">
    
        <header>
            <div class="logo">
                <div class="header-index">                             
                    <img src="./imagenes/LOGO.png" alt="Logo lembranças">
                </div>
            </div>
        </header> 

        <main>
            <div class="eslogan">
                <h1>En lembranzas somos una empresa apasionada por crear los mejores recuerdos de cada aventura.</h1>
            </div>

            
            
            <section>

                

                <div class="main-index">

                    <div class="cuestionarios">
                        <div class="contenedor-datos">                 
                        </div>

                        <div class="imagen">
                            <div class="header-index">                             
                                <img src="./imagenes/fondoAzul.jpg" alt="Logo lembranças">
                            </div>
                        </div>
                    </div>

                    <div class="contenedor-fechas"></div>

                    <div class="titulodecatalogo">
                        <h1>Cuando completes todos tus datos vas a poder elegir tus preferencias y abajo de todo revisar tu carrito:</h1>
                    </div>

                    <div class="categoria">
                        <h2>Habitaciones</h2>
                        <div class="productos productos-habitaciones">
                        </div>
                    </div>

                    <div class="categoria">
                        <h2></h2>
                        <div class="productos productos-servicios-habitacion">
                        </div>
                    </div>

                    <div class="categoria">
                        <h2></h2>
                        <div class="productos productos-servicios-playa">
                        </div>
                    </div>

                    <div class="ver-carrito">
                        <h2>Ver carrito</h2>
                    </div>

                    <div id="carrito-container">
                    </div>

                </div>
            </section>
        </main>

        <footer>
            
            <div id="toast">
            </div>

            <div class="footer-index">
                <img src="./imagenes/fondoDorado.jpg" alt="fondo">
            </div>
            
        </footer>

    </div>

    
    <script type="text/javascript"src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="script.js"></script>
</body>
</html>
